# Dependency update automation (Brief 180). Dependabot opens PRs for outdated
# deps and known security advisories; the non-blocking `npm audit` job in
# ci.yml is the per-PR report, this is the ongoing remediation path.
#
# minor+patch updates are grouped into one PR per ecosystem to keep the volume
# down; major bumps arrive as individual PRs (they usually need review anyway).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
