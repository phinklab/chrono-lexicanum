name: ci

# Runs on every PR and on every push to main: doc-only commits land directly
# on main per the PR policy (CLAUDE.md § Git) and previously skipped CI
# entirely (Report 144 § B.2) — lint/typecheck/brain:lint now cover that path.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run check:eras

      - run: npm run brain:lint -- --no-write
