name: ci

# Runs on every PR and on every push to main. Post-Brief-165 (CLAUDE.md § Git
# → "PR policy") every change — code and docs alike — reaches main only through
# a reviewed, CC-authored PR; there is no direct-to-main path anymore. The
# push: main trigger is therefore pure defense-in-depth — a safety net that
# re-checks lint/typecheck/brain:lint on anything that lands on main outside a
# PR (e.g. an explicitly authorized hotfix), not the doc-only path it once guarded.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Clean-install integrity gate (Launch S1b): after a fresh `npm ci`,
      # every DECLARED dependency must resolve to a version satisfying
      # package.json — the drift class that had a stale local next@16.2.9
      # running against a lockfile pinning 16.2.10. Deliberately not
      # `npm ls --all`: the deep tree carries platform-conditional optional
      # artifacts (npm materializes @img/sharp-wasm32 against next's nested
      # sharp on some hosts) that flag "invalid" without any real drift.
      - run: npm ls

      - run: npm run lint

      - run: npm run typecheck

      # DB-free assertion suites (~29 test-*.ts, Brief 180). Folded into this
      # existing required check so it gates PRs immediately without touching
      # branch-protection settings; the runner strips DATABASE_URL so no suite
      # can reach a real DB. DB-gated suites (test:ask-recommend) stay manual.
      - run: npm test

      - run: npm run check:eras

      - run: npm run brain:lint -- --no-write

      # DB-free production build (Launch S1b, plan § Session 1b Punkt 3). The
      # build must succeed WITHOUT a reachable database: prerender reads the
      # committed snapshot (scripts/snapshot-data/), never Postgres. The
      # DATABASE_URL below is syntactically valid but points at a port nothing
      # listens on — module imports succeed, while any leaked build-time query
      # fails immediately instead of hanging. Folded into this required job
      # (same pattern as `npm test`, Brief 180) so it gates PRs without a
      # branch-protection change.
      - run: npm run build
        env:
          DATABASE_URL: postgres://ci-build-must-not-touch-db:x@127.0.0.1:9/none
          NEXT_TELEMETRY_DISABLED: '1'
          # A production build without SITE_URL fails by design (Launch S5,
          # src/lib/site-url.ts) — canonicals/sitemap must never bake a
          # localhost origin. CI uses the reserved-invalid dummy host; the
          # real host lives in the Vercel env.
          SITE_URL: https://example.invalid

      # Mini smoke set, DB-free tranche (Launch S8, plan § Session 8 Punkt 8).
      # Folded into this required job (the npm test / npm run build pattern
      # above) so the set is REQUIRED without a branch-protection change.
      # `test:smoke` = projects `static` + `degraded` against the production
      # build just produced: the DB-free core routes (hub, map, podcasts,
      # hot-subset book detail, ask) serve their real content (landmark
      # asserts × 320/1280, axe, overflow) plus the menu-focus and map-seek
      # interaction smokes; /timeline + /archive degrade to the themed S2
      # error surface (never a 404) and the ISR book long tail never lies
      # (no 404, no empty page). The live main run (`test:smoke:live`:
      # timeline/archive content, timeline-vs-volume-slider smoke, cold-book
      # canary) is the documented mandatory local pre-merge run — S8
      # decision, see the session report; it moves into CI once a read-only
      # SMOKE_DATABASE_URL secret (S3a runtime role) is provisioned.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - run: npm run test:smoke

  # Audit policy (Launch S1b): production dependencies are held to a blocking
  # standard — a high/critical advisory in anything that ships to the runtime
  # (next, react, react-dom, drizzle-orm, postgres) fails CI. The full audit
  # (including dev/build-time deps) stays a non-blocking visible report; its
  # remediation flows through Dependabot (.github/dependabot.yml), since most
  # findings there are transitive dev deps whose fixes need major bumps.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm audit --omit=dev --audit-level=high

      - run: npm audit
        continue-on-error: true
