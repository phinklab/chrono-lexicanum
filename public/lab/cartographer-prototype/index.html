<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>40K Galactic Hologram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0703; overflow: hidden; overscroll-behavior: none; }
    body { font-family: "Rajdhani", system-ui, sans-serif; color: #f0b248; }
    #root { width: 100vw; height: 100vh; }
    * { box-sizing: border-box; }

    /* twinkle stars */
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
    /* drifting motes (volumetric) */
    @keyframes motedrift {
      0% { transform: translateZ(-40px) translate(0, 0); }
      100% { transform: translateZ(40px) translate(8px, -6px); }
    }
    /* HUD link pulse */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    /* holographic flicker */
    @keyframes holoflicker {
      0%, 100% { opacity: 0; }
      48% { opacity: 0; }
      50% { opacity: 0.05; }
      52% { opacity: 0; }
      70% { opacity: 0.03; }
      72% { opacity: 0; }
    }
    .holo-flicker { animation: holoflicker 5s infinite; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Radar sweep — slow continuous rotation */
    @keyframes radarSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Auspex ping — expanding ring pulse */
    @keyframes pingExpand {
      0%   { r: 0; opacity: 0.7; }
      80%  { opacity: 0.15; }
      100% { r: 48; opacity: 0; }
    }
    /* Planet hover ring — scales out from the planet's center */
    @keyframes reticleExpand {
      from { transform: scale(0); opacity: 0; }
      60%  { opacity: 1; }
      to   { transform: scale(1); opacity: 0.85; }
    }

    /* Hide all native scrollbars inside artboards */
    .holo-no-scrollbar::-webkit-scrollbar { display: none; }
    .holo-no-scrollbar { scrollbar-width: none; }

    /* ── Print / PDF export ────────────────────────────────────────────
       Triggered by the "Print / Save as PDF" button in Tweaks. We hide every
       overlay (controls, panels, toggles, search button, tweak panel) and
       let the disc fill an A4-landscape sheet. The disc is responsive — it
       reads window.innerWidth/innerHeight — so printing at the right page
       size produces a clean full-bleed render. */
    @media print {
      @page { size: A4 landscape; margin: 0; }
      html, body { background: #000 !important; overflow: visible !important; }
      /* Hide every absolutely-positioned overlay that's NOT the map itself.
         The map mounts as #root > div with internal positioning. */
      [data-no-drag],
      .twk-panel,
      .twk-toggle,
      button {
        display: none !important;
      }
      /* Hide just the chrome layers — keep the disc, stars, segments. */
      .holo-flicker { display: none !important; }
      /* Remove the dark vignette so the printed page isn't a black square */
      #root > div > div[style*="vignette"] { opacity: 0.3 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- data + tokens -->
  <script src="themes.js"></script>
  <script src="eras.js"></script>
  <script src="galaxy-data.js"></script>

  <!-- utility modules (load before any UI so they can attach to window) -->
  <script src="galaxy-share.js"></script>

  <!-- canvas + tweaks shells -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- hologram parts -->
  <script type="text/babel" src="galaxy-parts.jsx"></script>
  <script type="text/babel" src="galaxy-detail.jsx"></script>
  <script type="text/babel" src="galaxy-editor.jsx"></script>
  <script type="text/babel" src="galaxy-add.jsx"></script>
  <script type="text/babel" src="galaxy-hologram.jsx"></script>
  <script type="text/babel" src="galaxy-search.jsx"></script>

  <!-- entrypoint -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
