<style>
  /* ── Chrono Lexicanum tokens ──────────────────────────────────────────── */
  :root {
    --void: #050301;
    --bone: #e4ddcb;
    --dim: #9a927e;
    --faint: #6a6455;
    --gold: #a48c52;
    --gold-dim: #6f5c33;
    --display: "Cormorant SC", serif;
    --body: "Cardo", Georgia, serif;
    --mono: "Fragment Mono", ui-monospace, monospace;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    /* Runde 2: Gruppierung über Grund, nicht über Kante. Zwei Stufen reichen. */
    --ground-1: rgba(228, 221, 203, 0.028);  /* the choosing stratum   */
    --ground-2: rgba(228, 221, 203, 0.014);  /* the register stratum   */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--void); }
  body { font-family: var(--body); color: var(--bone); background: var(--void); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  .lab-bar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 22px 13px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--faint);
  }
  .lab-bar b { color: var(--gold); font-weight: 400; }
  .lab-bar nav a { color: var(--faint); text-decoration: none; padding-left: 14px; }
  .lab-bar nav a:hover { color: var(--bone); }

  .col { max-width: 780px; margin: 0 auto; padding-left: 22px; padding-right: 22px; }

  /* ── Stratum 0 · mast (void) ──────────────────────────────────────────── */
  .mast { padding: 9vh 0 52px; animation: rise 0.9s var(--ease) both; }
  .mast__kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; color: var(--faint); text-transform: uppercase; }
  .mast__title { font-family: var(--display); font-weight: 600; font-size: clamp(36px, 7vw, 58px); line-height: 1.02; margin-top: 14px; }
  .tools { display: flex; flex-wrap: wrap; column-gap: 28px; row-gap: 6px; margin-top: 34px; }
  .tools a { text-decoration: none; font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); transition: color 0.3s; }
  .tools a:hover { color: var(--dim); }
  .tools a em { font-style: normal; }
  .tools a[aria-current] { color: var(--gold); }
  .tools a[aria-current]::before { content: "● "; font-size: 8px; vertical-align: 1px; }

  /* ── Stratum 1 · the choosing (lifted ground, full-bleed) ─────────────── */
  .choose { background: var(--ground-1); padding: 40px 0 42px; animation: rise 0.9s 0.1s var(--ease) both; }
  .choose__kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); }

  .fac { display: flex; align-items: baseline; gap: 4px; margin-top: 18px; }
  .fac__name { font-family: var(--display); font-weight: 600; font-size: clamp(27px, 5.6vw, 40px); line-height: 1.05; flex: 1; min-width: 0; }
  .fac__step { display: inline-flex; align-items: center; gap: 2px; flex: none; transform: translateY(-2px); }
  .fac__step button { padding: 6px 12px; font-size: 22px; line-height: 1; color: var(--dim); transition: color 0.25s; }
  .fac__step button:hover { color: var(--gold); }
  .fac__ix { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--faint); font-variant-numeric: tabular-nums; padding: 0 4px; }

  /* roster — one quiet snap-scroll line, edges dissolving into the ground */
  .roster {
    display: flex; gap: 24px; margin-top: 22px;
    overflow-x: auto; scroll-snap-type: x proximity;
    scrollbar-width: none; -ms-overflow-style: none;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 26px, #000 calc(100% - 26px), transparent);
            mask-image: linear-gradient(90deg, transparent, #000 26px, #000 calc(100% - 26px), transparent);
    padding: 2px 26px 6px;
    margin-left: -26px; margin-right: -26px;
  }
  .roster::-webkit-scrollbar { display: none; }
  .roster button {
    flex: none; scroll-snap-align: center;
    font-family: var(--body); font-size: 12.5px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--faint); white-space: nowrap; padding: 3px 0;
    transition: color 0.3s;
  }
  .roster button:hover { color: var(--dim); }
  .roster button.on { color: var(--gold); }

  .chapters { display: flex; flex-wrap: wrap; align-items: baseline; column-gap: 8px; row-gap: 4px; margin-top: 20px; }
  .chapters__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); margin-right: 10px; }
  .chapters button { font-family: var(--body); font-size: 12.5px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--dim); padding: 2px 0; transition: color 0.3s; }
  .chapters button + button::before { content: "·"; color: var(--faint); padding: 0 9px; }
  .chapters button:hover { color: var(--bone); }
  .chapters button.on { color: var(--gold); }

  /* ── Stratum 2 · the answer (deepest void — the stage) ────────────────── */
  .answer { padding: 58px 0 30px; animation: rise 0.9s 0.2s var(--ease) both; }
  .answer__kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--faint); }
  .answer__kicker em { font-style: normal; color: var(--gold); }
  .answer__title { font-family: var(--display); font-weight: 600; font-size: clamp(34px, 7.4vw, 60px); line-height: 1.04; margin-top: 16px; max-width: 15ch; }
  .answer__by { font-style: italic; font-size: 16px; color: var(--dim); margin-top: 12px; }
  .answer__by .k { font-style: normal; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); padding-left: 12px; }
  .answer__note { font-size: 15px; line-height: 1.55; color: var(--dim); margin-top: 16px; max-width: 54ch; }
  .answer__cta {
    display: inline-block; margin-top: 26px; padding: 13px 26px; border-radius: 2px;
    background: rgba(164, 140, 82, 0.13);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--gold); text-decoration: none;
    transition: background 0.3s, color 0.3s;
  }
  .answer__cta:hover { background: rgba(164, 140, 82, 0.22); color: var(--bone); }

  /* ── Stratum 3 · the register (faintest ground) ───────────────────────── */
  .register { background: var(--ground-2); padding: 30px 0 40px; margin-top: 40px; animation: rise 0.9s 0.3s var(--ease) both; }
  .register__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--faint); }
  .register .row {
    display: flex; align-items: baseline; gap: 14px; width: 100%;
    padding: 12px 0 11px; text-align: left; transition: color 0.25s;
  }
  .register .row .ord { font-family: var(--mono); font-size: 10px; color: var(--faint); flex: none; }
  .register .row .t { font-family: var(--body); font-size: 15.5px; color: var(--dim); flex: 1; transition: color 0.25s; }
  .register .row .t i { color: var(--faint); }
  .register .row .swap { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: transparent; flex: none; transition: color 0.25s; }
  .register .row:hover .t { color: var(--bone); }
  .register .row:hover .swap { color: var(--gold); }
  .register__empty { font-style: italic; font-size: 14px; color: var(--faint); padding-top: 12px; }

  .foot { padding: 60px 0 80px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); text-align: center; }

  .swap-in { animation: rise 0.5s var(--ease) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  @media (min-width: 720px) {
    .col { padding-left: 40px; padding-right: 40px; }
    .roster { padding-left: 44px; padding-right: 44px; margin-left: -44px; margin-right: -44px; }
  }
</style>

}]},{"label":"Death Guard","picks":[{"t":"The Lords of Silence","a":"Chris Wraight","k":"Novel","n":"First-Captain Vorx leads the Lords of Silence, a Death Guard warband sailing with Abaddon's Thirteenth Black Crusade, when their grand cruiser Solace is flung off course into a nameless stretch of the warp."}]},{"label":"Night Lords","picks":[{"t":"Night Lords: The Omnibus","a":"Aaron Dembski-Bowden","k":"Omnibus","n":"The complete saga of the galaxy's most feared traitors, collecting the Night Lords trilogy — Soul Hunter, Blood Reaver and Void Stalker — alongside the short fiction that frames it."},{"t":"Lord of the Night","a":"Simon Spurrier","k":"Novel","n":"Zso Sahaal — First Captain of the VIII Legion, lost in the warp for ten thousand years since the death of his master Konrad Curze — surfaces back into realspace on the sunless hive"}]},{"label":"Thousand Sons","picks":[{"t":"Ahriman: The Omnibus","a":"John French","k":"Series","n":"The complete saga of the Thousand Sons' greatest sorcerer, gathered into a single volume."},{"t":"Battle of the Fang","a":"Chris Wraight","k":"Novel","n":"A thousand years after the Horus Heresy, the daemon primarch Magnus the Red leads his Thousand Sons in a vengeful assault on Fenris, home world of the Space Wolves."}]},{"label":"World Eaters","picks":[{"t":"Angron: The Red Angel","a":"David Guymer","k":"Novel","n":"In Imperium Nihilus, Angron's return is less a miracle than a wound torn open across half a million abandoned worlds."},{"t":"Khârn: Eater of Worlds","a":"Anthony Reynolds","k":"Novel","n":"The Horus Heresy is broken, and the traitor legions scatter before a vengeful Imperium."}]},{"label":"Emperor's Children","picks":[{"t":"Lucius: The Faultless Blade","a":"Ian St. Martin","k":"Novel","n":"Series-start Lucius novel. Lucius the Eternal — Soulthief, Champion of Slaanesh, doomed to reincarnate in any opponent who kills him without exulting — finds his Emperor's Children"},{"t":"Renegades: Lord of Excess","a":"Rich McCorm lete Twice-Dead King in one volume: the duology Ruin and Reign — exiled lord Oltyx's reckoning with the brother who broke him, the orks at his gates, and the fla"}]},{"label":"Leagues of Votann","picks":[{"t":"The High Kâhl’s Oath","a":"Gav Thorpe","k":"Novel","n":"The galactic core is beset by warp storms of a fury the Leagues of Votann have not seen for ten millennia."}]},{"label":"Orks","picks":[{"t":"Brutal Kunnin","a":"Mike Brooks","k":"Novel","n":"Ufthak Blackhawk, a Goff Big-Mek with more cunning than anyone wants to admit, leads an Ork assault on the forge world Hephaesto and finds Kaptin Badrukk's Freebooterz already looting the prize."},{"t":"Ghazghkull Thraka: Prophet of the Waaagh!","a":"Nate Crowley","k":"Novel","n":"A radical Ordo Xenos inquisitor named Falx has captured a grot calling himself Makari, the personal banner-bearer of Ghazghkull Mag Uruk Thraka — the warlord whose Waaagh!"}]},{"label":"T'au Empire","picks":[{"t":"Elemental Council","k":"Novel","n":"On Cao Quo, a newly annexed human world keeps resisting the T'au Empire with sabotage, insurgency, and stubborn memory."},{"t":"Farsight","a":"Phil Kelly","k":"Novella","n":"When the young and gifted Commander Farsight is chosen to lead a crusade across the Damocles Gulf, the T'au Empire expects an easy reconquest of its lost colonies."}]},{"label":"Tyranids","picks":[{"t":"Valedor","a":"Guy Haley","k":"Omnibus","n":"Apocalypse-scale Eldar novel set at the Battle of Duriel."},{"t":"The Long and Hungry Road","a":"Adrian Tchaikovsky","n":"A rare glimpse inside the tyranid hive mind as a hive fleet's vanguard descends on the doomed world of Chertes, whose defenders mount a resistance that is ultimately consumed."}]},{"label":"Inquisition","picks":[{"t":"Eisenhorn Omnibus","a":"Dan Abnett","k":"Omnibus","n":"Omnibus collecting Xenos, Malleus and Hereticus plus the short stories \"Missing in Action\" and \"Backcloth for a Crown Additional\" — the full first arc of Inquisitor Gregor Eisenhorn's record."},{"t":"Ravenor: The Omnibus","a":"Dan Abnett","k":"Series","n":"Omnibus collecting Ravenor, Ravenor Returned and Ravenor Rogue, plus the short stories \"Thorn Wishes Talon\" and \"Playing Patience\"."},{"t":"The Inquisition War Omnibus","a":"Ian Watson","k":"Omnibus","n":"Jaq Draco's Inquisition War is gathered here as one feverish early-40K epic: an Ordo Malleus inquisitor sent to cleanse a Genestealer-tainted hive world instead uncovers the Hydra,"}]}];

const $ = (id) => document.getElementById(id);
let fi = 0, ci = 0, pi = 0;
const pad = (n) => String(n).padStart(2, "0");

function chapterIndexWithPicks(f) {
  if (!f.chapters) return -1;
  if (f.picks) return ci; /* faction has own picks; chapter optional */
  const k = f.chapters.findIndex((c) => c.picks);
  return k < 0 ? 0 : k;
}
function currentPicks() {
  const f = FACTIONS[fi];
  if (f.chapters) {
    const ch = f.chapters[ci];
    if (ch && ch.picks) return ch.picks;
    return f.picks || [];
  }
  return f.picks || [];
}

function renderChoose() {
  const f = FACTIONS[fi];
  $("facName").textContent = f.label;
  $("ix").textContent = pad(fi + 1) + " / " + pad(FACTIONS.length);
  $("roster").innerHTML = FACTIONS.map((x, i) =>
    `<button type="button" role="tab" aria-selected="${i === fi}" class="${i === fi ? "on" : ""}" data-f="${i}">${x.label}</button>`
  ).join("");
  const on = $("roster").querySelector(".on");
  if (on) on.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });

  const ch = $("chapters");
  if (!f.chapters) { ch.hidden = true; ch.innerHTML = ""; return; }
  ch.hidden = false;
  const rows = f.picks ? [{ label: "Overall", picks: f.picks }, ...f.chapters] : f.chapters;
  const offset = f.picks ? 1 : 0;
  ch.innerHTML = `<span class="chapters__label">Chapter</span>` + rows.map((c, i) => {
    const real = i - offset; /* -1 = overall */
    const active = f.picks ? (real === -1 ? ci === -1 : ci === real) : ci === real;
    return `<button type="button" class="${active ? "on" : ""}" data-c="${real}">${c.label}</button>`;
  }).join("");
}

function renderAnswer() {
  const picks = currentPicks();
  const p = picks[pi] || picks[0];
  if (!p) {
    $("answerSlot").innerHTML = `<div class="swap-in"><p class="answer__kicker">The archive answers</p><p class="answer__note" style="font-style:italic">— no records on file yet —</p></div>`;
    $("registerSlot").innerHTML = `<p class="register__empty">The shelf stands empty.</p>`;
    return;
  }
  const f = FACTIONS[fi];
  const where = f.chapters && ci >= 0 && f.chapters[ci] ? `${f.label} · ${f.chapters[ci].label}` : f.label;
  $("answerSlot").innerHTML = `
    <div class="swap-in">
      <p class="answer__kicker">The archive answers — <em>${where}</em></p>
      <h2 class="answer__title">${p.t}</h2>
      <p class="answer__by">${p.a ? "by " + p.a : ""}${p.k ? `<span class="k">${p.k}</span>` : ""}</p>
      ${p.n ? `<p class="answer__note">${p.n}</p>` : ""}
      <a class="answer__cta" href="#">Open the book →</a>
    </div>`;
  const idx = picks.indexOf(p);
  const alts = picks.map((alt, i) => ({ alt, i })).filter((x) => x.i !== idx);
  $("registerSlot").innerHTML = alts.length
    ? alts.map(({ alt, i }, j) =>
        `<button type="button" class="row swap-in" style="animation-delay:${0.06 * j}s" data-p="${i}">
          <span class="ord">${String.fromCharCode(98 + j)}.</span>
          <span class="t">${alt.t}${alt.a ? ` — <i>${alt.a}</i>` : ""}</span>
          <span class="swap">READ THIS →</span>
        </button>`).join("")
    : `<p class="register__empty">A single verdict — the archive speaks with one voice.</p>`;
}

function setFaction(i) {
  fi = (i + FACTIONS.length) % FACTIONS.length;
  const f = FACTIONS[fi];
  ci = f.chapters ? (f.picks ? -1 : chapterIndexWithPicks(f)) : 0;
  pi = 0;
  renderChoose(); renderAnswer();
}

$("prev").addEventListener("click", () => setFaction(fi - 1));
$("next").addEventListener("click", () => setFaction(fi + 1));
$("roster").addEventListener("click", (e) => { const b = e.target.closest("[data-f]"); if (b) setFaction(+b.dataset.f); });
$("chapters").addEventListener("click", (e) => {
  const b = e.target.closest("[data-c]"); if (!b) return;
  ci = +b.dataset.c; pi = 0; renderChoose(); renderAnswer();
});
$("registerSlot").addEventListener("click", (e) => { const b = e.target.closest("[data-p]"); if (b) { pi = +b.dataset.p; renderAnswer(); } });
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") setFaction(fi - 1);
  if (e.key === "ArrowRight") setFaction(fi + 1);
});

setFaction(0);
</script>
</body>
</html>
