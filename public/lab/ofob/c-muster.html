<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OFOB Lab · C — Muster Roll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@500;600;700&family=Cardo:ital,wght@0,400;0,700;1,400&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050301;
    --bone: #e4ddcb;
    --dim: #9a927e;
    --faint: #6a6455;
    --gold: #a48c52;
    --gold-dim: #6f5c33;
    --hair: rgba(228, 221, 203, 0.16);
    --hair-soft: rgba(228, 221, 203, 0.08);
    --display: "Cormorant SC", serif;
    --body: "Cardo", Georgia, serif;
    --mono: "Fragment Mono", ui-monospace, monospace;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--void); }
  body {
    font-family: var(--body); color: var(--bone);
    background: radial-gradient(120% 90% at 50% -10%, rgba(228, 221, 203, 0.035), transparent 60%), var(--void);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  .lab-bar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 20px; font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint);
    border-bottom: 1px solid var(--hair-soft);
  }
  .lab-bar b { color: var(--gold); font-weight: 400; }
  .lab-bar nav a { color: var(--faint); text-decoration: none; padding-left: 14px; }
  .lab-bar nav a:hover { color: var(--bone); }

  .wrap { max-width: 680px; margin: 0 auto; padding: 8vh 20px 120px; }

  .mast { text-align: center; margin-bottom: 54px; }
  .mast__kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; color: var(--faint); text-transform: uppercase; }
  .mast__title { font-family: var(--display); font-weight: 600; font-size: clamp(34px, 6vw, 52px); line-height: 1.05; margin-top: 12px; }

  .doors { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); margin-bottom: 64px; }
  .door { display: block; padding: 20px 18px 22px; text-decoration: none; color: inherit; }
  .door + .door { border-left: 1px solid var(--hair-soft); }
  .door__kicker { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--faint); }
  .door__kicker .on { color: var(--gold); }
  .door__title { font-family: var(--display); font-weight: 600; font-size: 21px; color: var(--gold); margin-top: 8px; line-height: 1.15; }
  .door--off .door__title { color: var(--dim); }
  .door__desc { font-style: italic; font-size: 12.5px; color: var(--faint); margin-top: 6px; }
  @media (max-width: 640px) { .doors { grid-template-columns: 1fr; } .door + .door { border-left: 0; border-top: 1px solid var(--hair-soft); } }

  /* ── Concept C: the muster roll ────────────────────────────────────────── */
  .roll { border-top: 1px solid var(--hair); }
  .roll__foot { border-top: 1px solid var(--hair); }

  /* collapsed summary row — catalogue-row grammar */
  .sum {
    display: flex; align-items: baseline; gap: 14px; width: 100%;
    min-height: 46px; padding: 13px 4px 12px;
    border-bottom: 1px solid var(--hair-soft);
    text-align: left; transition: background 0.25s;
    animation: rowIn 0.4s var(--ease) both;
  }
  .sum:hover { background: rgba(228, 221, 203, 0.03); }
  .sum__n { font-family: var(--mono); font-size: 10.5px; color: var(--faint); flex: none; width: 20px; }
  .sum__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); flex: none; width: 74px; }
  .sum__value { font-family: var(--body); font-size: 15px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); flex: 1; }
  .sum__change { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); flex: none; }
  .sum:hover .sum__change { color: var(--bone); }
  @keyframes rowIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  /* expanded entry */
  .entry { border-bottom: 1px solid var(--hair-soft); padding: 18px 4px 26px; animation: entryIn 0.5s var(--ease) both; }
  @keyframes entryIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .entry__head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
  .entry__n { font-family: var(--mono); font-size: 10.5px; color: var(--gold); flex: none; width: 20px; }
  .entry__kicker { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--gold); }
  .entry__kicker .note { color: var(--faint); letter-spacing: 0.1em; text-transform: none; }

  /* pick list — one choice per row, honest 18-row length */
  .list { list-style: none; margin-top: 10px; }
  .list button {
    display: flex; align-items: baseline; gap: 14px; width: 100%;
    min-height: 44px; padding: 11px 4px 10px;
    text-align: left; transition: background 0.25s;
  }
  .list li + li button { border-top: 1px solid var(--hair-soft); }
  .list button:hover { background: rgba(228, 221, 203, 0.03); }
  .list__ord { font-family: var(--mono); font-size: 10px; color: var(--faint); flex: none; width: 20px; }
  .list__name { font-family: var(--body); font-size: 14.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); flex: 1; }
  .list button:hover .list__name { color: var(--bone); }
  .list__chev { font-size: 14px; color: var(--faint); flex: none; }
  .list__hint { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--faint); flex: none; text-transform: uppercase; }

  /* the double "total" rule above the verdict */
  .totalrule { border-bottom: 1px solid var(--hair); height: 3px; border-top: 1px solid var(--hair); }

  /* verdict entry */
  .verdict { padding: 22px 4px 30px; border-bottom: 1px solid var(--hair); animation: entryIn 0.5s var(--ease) both; }
  .verdict__head { display: flex; align-items: baseline; gap: 14px; }
  .verdict__body { padding-left: 34px; }
  .verdict__title { font-family: var(--display); font-weight: 600; font-size: clamp(28px, 5.4vw, 38px); line-height: 1.08; margin-top: 10px; }
  .verdict__meta { font-style: italic; font-size: 14.5px; color: var(--dim); margin-top: 8px; }
  .verdict__meta .badge::before { content: "· "; color: var(--faint); }
  .verdict__note { font-size: 14.5px; color: var(--dim); margin-top: 11px; max-width: 52ch; }
  .verdict__cta {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 18px; padding: 12px 22px;
    border: 1px solid var(--gold-dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--gold); text-decoration: none; transition: border-color 0.3s, color 0.3s;
  }
  .verdict__cta::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
  .verdict__cta:hover { border-color: var(--gold); color: var(--bone); }

  .alts { margin-top: 22px; }
  .alts__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); }
  .alts button {
    display: flex; align-items: baseline; gap: 12px; width: 100%;
    padding: 10px 2px; text-align: left; border-bottom: 1px solid var(--hair-soft);
    transition: background 0.25s;
  }
  .alts button:last-child { border-bottom: 0; }
  .alts button:hover { background: rgba(228, 221, 203, 0.03); }
  .alts__swap { font-family: var(--mono); font-size: 12px; color: var(--faint); flex: none; }
  .alts__title { font-family: var(--body); font-size: 15px; color: var(--dim); flex: 1; }
  .alts button:hover .alts__title { color: var(--bone); }

  .reset { margin-top: 26px; text-align: center; }
  .reset button { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint); }
  .reset button:hover { color: var(--bone); }

  @media (min-width: 720px) {
    /* desktop: the pick list flows into two columns of rows */
    .list--two { display: grid; grid-template-columns: 1fr 1fr; column-gap: 40px; }
    .list--two li:nth-child(2) button { border-top: 0; }
  }
</style>
</head>
<body>
  <div class="lab-bar">
    <span>LAB · OFOB HIERARCHY — <b>C · MUSTER ROLL</b></span>
    <nav><a href="./a-spine.html">A</a><a href="./b-console.html">B</a><a href="./index.html">INDEX</a></nav>
  </div>

  <main class="wrap">
    <header class="mast">
      <p class="mast__kicker">Consult the Archive</p>
      <h1 class="mast__title">Find Your Next Book</h1>
    </header>

    <nav class="doors" aria-label="Tools">
      <a class="door door--off" href="#">
        <p class="door__kicker">Tool I</p>
        <p class="door__title">Ask the Archive</p>
        <p class="door__desc">Five questions, ranked verdicts</p>
      </a>
      <a class="door" href="#" aria-current="page">
        <p class="door__kicker"><span class="on">● </span>Tool II</p>
        <p class="door__title">One Faction, One Book</p>
        <p class="door__desc">Pick a banner, receive an entry point</p>
      </a>
    </nav>

    <section class="roll" id="roll" aria-label="One faction, one book"></section>
    <div class="reset"><button type="button" id="reset">↺ start over</button></div>
  </main>

<script>
/* Full 18-faction roster — real starter picks from faction-starters.json. */
const FACTIONS = [
  { label: "Adepta Sororitas", picks: [
    { t: "Our Martyred Lady", a: "Danie Ware", k: "Audio Drama", note: "Sister Augusta's war of faith — the Order of Our Martyred Lady in fire and censer-smoke." },
    { t: "Rose at War", a: "Danie Ware", k: "Novel" },
    { t: "Rose in Darkness", a: "Danie Ware", k: "Novel" },
    { t: "Morvenn Vahl — Spear of Faith", a: "Jude Reid", k: "Novel" } ]},
  { label: "Adeptus Custodes", picks: [ { t: "Watchers of the Throne", a: "Chris Wraight", k: "Series" } ]},
  { label: "Adeptus Mechanicus", picks: [ { t: "Priests of Mars", a: "Graham McNeill", k: "Trilogy" }, { t: "Belisarius Cawl: The Great Work", a: "Guy Haley", k: "Novel" } ]},
  { label: "Astra Militarum", picks: [ { t: "Fifteen Hours", a: "Mitchel Scanlon", k: "Audiobook", note: "One Guardsman, one dying world — the life expectancy on Broucheroc is fifteen hours." } ],
    chapters: [
      { label: "Overall", picks: null },
      { label: "Aeronautica Imperialis", picks: [ { t: "Double Eagle", a: "Dan Abnett", k: "Novel" } ] },
      { label: "Death Korps of Krieg", picks: [ { t: "Krieg", a: "Steve Lyons", k: "Novel", note: "Gas-masked and unforgiven — the Death Korps at the Siege of Vraks." } ] },
      { label: "Catachan Jungle Fighters", picks: [ { t: "Deathworlder", a: "Victoria Hayward", k: "Novel" } ] },
      { label: "Cadian", picks: [ { t: "Cadia Stands", a: "Justin D. Hill", k: "Novel" }, { t: "Minka Lesk — The Last Whiteshield", a: "Justin D. Hill", k: "Novel" }, { t: "Catachan Devil", a: "Justin D. Hill", k: "Novel" } ] } ]},
  { label: "Grey Knights", picks: [ { t: "The Emperor's Gift", a: "Aaron Dembski-Bowden", k: "Novel" }, { t: "Grey Knights Omnibus", a: "Ben Counter", k: "Omnibus" } ]},
  { label: "Imperial Agents", picks: [ { t: "Assassinorum: Kingmaker", a: "Robert Rath", k: "Novel" }, { t: "Rites of Passage", a: "Mike Brooks", k: "Novel" }, { t: "Ciaphas Cain", a: "Sandy Mitchell", k: "Series" } ]},
  { label: "Imperial Knights", picks: [ { t: "Kingsblade", a: "Andy Clark", k: "Series" }, { t: "Assassinorum: Kingmaker", a: "Robert Rath", k: "Novel" } ]},
  { label: "Space Marines", picks: null, chapters: [
      { label: "Ultramarines", picks: [ { t: "Dark Imperium", a: "Guy Haley", k: "Novel", note: "Guilliman returns to a ruined Imperium — the Era Indomitus begins here." }, { t: "Uriel Ventris Chronicles", a: "Graham McNeill", k: "Series" } ] },
      { label: "Blood Angels", picks: [ { t: "Dante", a: "Guy Haley", k: "Novel" } ] },
      { label: "Dark Angels", picks: [ { t: "The Lion: Son of the Forest", a: "Mike Brooks", k: "Novel" } ] },
      { label: "Black Templars", picks: [ { t: "Helsreach", a: "Aaron Dembski-Bowden", k: "Novel" } ] },
      { label: "Deathwatch", picks: [ { t: "Deathwatch: The Omnibus", a: "Steve Parker", k: "Omnibus" } ] },
      { label: "Imperial Fists", picks: [ { t: "Fist of the Imperium", a: "Andy Clark", k: "Novel" } ] },
      { label: "Iron Hands", picks: [ { t: "Wrath of Iron", a: "Chris Wraight", k: "Novel" } ] },
      { label: "Raven Guard", picks: [ { t: "Apocalypse", a: "Josh Reynolds", k: "Novel" } ] },
      { label: "Salamanders", picks: [ { t: "Salamanders Omnibus", a: "Nick Kyme", k: "Omnibus" } ] },
      { label: "Space Wolves", picks: [ { t: "Space Wolf Omnibus", a: "William King", k: "Omnibus" } ] },
      { label: "White Scars", picks: [ { t: "Masters of the Hunt", a: "Chris Wraight", k: "Omnibus" } ] } ]},
  { label: "Chaos Space Marines", picks: null, chapters: [
      { label: "Black Legion", picks: [ { t: "The Talon of Horus", a: "Aaron Dembski-Bowden", k: "Novel" } ] },
      { label: "Night Lords", picks: [ { t: "Night Lords Omnibus", a: "Aaron Dembski-Bowden", k: "Omnibus" } ] },
      { label: "Death Guard", picks: [ { t: "Lords of Silence", a: "Chris Wraight", k: "Novel" } ] },
      { label: "Thousand Sons", picks: [ { t: "Ahriman", a: "John French", k: "Series" } ] },
      { label: "World Eaters", picks: [ { t: "Angron: The Red Angel", a: "David Guymer", k: "Novel" } ] },
      { label: "Iron Warriors", picks: [ { t: "Storm of Iron", a: "Graham McNeill", k: "Novel" } ] },
      { label: "Word Bearers", picks: [ { t: "The Word Bearers Omnibus", a: "Anthony Reynolds", k: "Omnibus" } ] },
      { label: "Fabius Bile", picks: [ { t: "Fabius Bile: The Omnibus", a: "Josh Reynolds", k: "Omnibus" } ] },
      { label: "Alpha Legion", picks: [ { t: "Renegades: Harrowmaster", a: "Mike Brooks", k: "Novel" } ] },
      { label: "Emperor's Children", picks: [ { t: "Lucius: The Faultless Blade", a: "Ian St. Martin", k: "Novel" } ] },
      { label: "Red Corsairs", picks: [ { t: "Huron Blackheart: Master of the Maelstrom", a: "Mike Brooks", k: "Novel" } ] } ]},
  { label: "Aeldari", picks: [ { t: "Valedor", a: "Guy Haley", k: "Novel" }, { t: "Path of the Eldar", a: "Gav Thorpe", k: "Omnibus" } ]},
  { label: "Drukhari", picks: [ { t: "Lelith Hesperax", a: "Rachel Harrison", k: "Novel" }, { t: "Path of the Dark Eldar", a: "Andy Chambers", k: "Omnibus" } ]},
  { label: "Genestealer Cults", picks: [ { t: "Day of Ascension", a: "Adrian Tchaikovsky", k: "Novel" } ]},
  { label: "Necrons", picks: [ { t: "The Infinite and the Divine", a: "Robert Rath", k: "Novel", note: "Trazyn and Orikan feud across sixty million years — the archive's most beloved duel of immortals." }, { t: "The Twice-Dead King: Ruin", a: "Nate Crowley", k: "Novel" } ]},
  { label: "Leagues of Votann", picks: [ { t: "The High Kâhl's Oath", a: "Alec Worley", k: "Novella" } ]},
  { label: "Orks", picks: [ { t: "Brutal Kunnin", a: "Mike Brooks", k: "Novel" }, { t: "Ghazghkull Thraka: Prophet of the Waaagh!", a: "Nate Crowley", k: "Novel" } ]},
  { label: "T'au Empire", picks: [ { t: "Elemental Council", a: "Noah Van Nguyen", k: "Novel" }, { t: "Farsight: Crisis of Faith", a: "Phil Kelly", k: "Novel" } ]},
  { label: "Tyranids", picks: [ { t: "The Great Devourer", a: "Various", k: "Omnibus" }, { t: "The Long and Hungry Road", a: "Marc Collins", k: "Novel" } ]},
  { label: "Inquisition", picks: [ { t: "Eisenhorn", a: "Dan Abnett", k: "Omnibus", note: "Where half the archive began — the inquisitor whose fall is measured in three books." }, { t: "Ravenor", a: "Dan Abnett", k: "Series" }, { t: "The Inquisition War", a: "Ian Watson", k: "Omnibus" } ]},
];

const roll = document.getElementById("roll");
const pad = (n) => String(n).padStart(2, "0");

/* state: which step is live; null faction = nothing chosen yet */
let fi = null, ci = null, pi = 0, editing = 1;

function currentPicks() {
  if (fi == null) return [];
  const f = FACTIONS[fi];
  if (f.chapters) {
    const ch = f.chapters[ci ?? 0];
    return ch.picks || f.picks || f.chapters.find((c) => c.picks)?.picks || [];
  }
  return f.picks || [];
}

function render() {
  const f = fi != null ? FACTIONS[fi] : null;
  const hasChapters = !!f?.chapters;
  let html = "";

  /* Entry I — faction */
  if (editing === 1 || fi == null) {
    html += `
      <div class="entry">
        <div class="entry__head">
          <span class="entry__n">I</span>
          <p class="entry__kicker">Choose your faction</p>
        </div>
        <ul class="list list--two">
          ${FACTIONS.map((x, i) => `
            <li><button type="button" data-f="${i}">
              <span class="list__ord">${pad(i + 1)}</span>
              <span class="list__name">${x.label}</span>
              <span class="list__chev">›</span>
            </button></li>`).join("")}
        </ul>
      </div>`;
  } else {
    html += `
      <button type="button" class="sum" data-edit="1">
        <span class="sum__n">I</span>
        <span class="sum__label">Faction</span>
        <span class="sum__value">${f.label}</span>
        <span class="sum__change">Change</span>
      </button>`;
  }

  /* Entry II — chapter (only when the faction has chapters) */
  if (f && hasChapters) {
    if (editing === 2) {
      html += `
        <div class="entry">
          <div class="entry__head">
            <span class="entry__n">II</span>
            <p class="entry__kicker">Narrow to a chapter <span class="note">· optional</span></p>
          </div>
          <ul class="list">
            ${f.chapters.map((c, i) => `
              <li><button type="button" data-c="${i}">
                <span class="list__ord">${pad(i + 1)}</span>
                <span class="list__name">${c.label}</span>
                ${c.picks === null ? `<span class="list__hint">skip · overall</span>` : `<span class="list__chev">›</span>`}
              </button></li>`).join("")}
          </ul>
        </div>`;
    } else if (ci != null) {
      html += `
        <button type="button" class="sum" data-edit="2">
          <span class="sum__n">II</span>
          <span class="sum__label">Chapter</span>
          <span class="sum__value">${f.chapters[ci].label}</span>
          <span class="sum__change">Change</span>
        </button>`;
    }
  }

  /* Entry III — the verdict, under the double "total" rule */
  if (f && editing === 3) {
    const picks = currentPicks();
    const p = picks[Math.min(pi, picks.length - 1)];
    const others = p ? picks.filter((x) => x !== p) : [];
    html += `<div class="totalrule"></div>`;
    html += `
      <div class="verdict">
        <div class="verdict__head">
          <span class="entry__n">III</span>
          <p class="entry__kicker">Your entry point</p>
        </div>
        <div class="verdict__body">
          ${p ? `
            <h2 class="verdict__title">${p.t}</h2>
            <p class="verdict__meta">by ${p.a}<span class="badge">${p.k}</span></p>
            ${p.note ? `<p class="verdict__note">${p.note}</p>` : ""}
            <a class="verdict__cta" href="#">Open the book →</a>
            ${others.length ? `
              <div class="alts">
                <p class="alts__label">Alternatives</p>
                ${others.map((alt) => `
                  <button type="button" data-p="${picks.indexOf(alt)}">
                    <span class="alts__swap">⇄</span>
                    <span class="alts__title">${alt.t} — <i>${alt.a}</i></span>
                  </button>`).join("")}
              </div>` : ""}
          ` : `<p class="verdict__note" style="font-style:italic">— No records in the archive yet —</p>`}
        </div>
      </div>`;
  } else {
    html += `<div class="roll__foot"></div>`;
  }

  roll.innerHTML = html;
}

roll.addEventListener("click", (e) => {
  const fBtn = e.target.closest("[data-f]");
  if (fBtn) {
    fi = +fBtn.dataset.f; ci = null; pi = 0;
    editing = FACTIONS[fi].chapters ? 2 : 3;
    if (!FACTIONS[fi].chapters) ci = null;
    render(); return;
  }
  const cBtn = e.target.closest("[data-c]");
  if (cBtn) { ci = +cBtn.dataset.c; pi = 0; editing = 3; render(); return; }
  const eBtn = e.target.closest("[data-edit]");
  if (eBtn) { editing = +eBtn.dataset.edit; render(); return; }
  const pBtn = e.target.closest("[data-p]");
  if (pBtn) { pi = +pBtn.dataset.p; render(); return; }
});

document.getElementById("reset").addEventListener("click", () => { fi = null; ci = null; pi = 0; editing = 1; render(); });

render();
</script>
</body>
</html>
