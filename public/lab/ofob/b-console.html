<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OFOB Lab · B — Cogitator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@500;600;700&family=Cardo:ital,wght@0,400;0,700;1,400&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050301;
    --bone: #e4ddcb;
    --dim: #9a927e;
    --faint: #6a6455;
    --gold: #a48c52;
    --gold-dim: #6f5c33;
    --hair: rgba(228, 221, 203, 0.16);
    --hair-soft: rgba(228, 221, 203, 0.08);
    --plate2: rgba(7, 5, 2, 0.86);
    --display: "Cormorant SC", serif;
    --body: "Cardo", Georgia, serif;
    --mono: "Fragment Mono", ui-monospace, monospace;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--void); }
  body {
    font-family: var(--body); color: var(--bone);
    background: radial-gradient(120% 90% at 50% -10%, rgba(228, 221, 203, 0.035), transparent 60%), var(--void);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  .lab-bar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 20px; font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--faint);
    border-bottom: 1px solid var(--hair-soft);
  }
  .lab-bar b { color: var(--gold); font-weight: 400; }
  .lab-bar nav a { color: var(--faint); text-decoration: none; padding-left: 14px; }
  .lab-bar nav a:hover { color: var(--bone); }

  .wrap { max-width: 720px; margin: 0 auto; padding: 8vh 20px 120px; }

  .mast { text-align: center; margin-bottom: 54px; }
  .mast__kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; color: var(--faint); text-transform: uppercase; }
  .mast__title { font-family: var(--display); font-weight: 600; font-size: clamp(34px, 6vw, 52px); line-height: 1.05; margin-top: 12px; }

  /* doors — two variants, toggleable, so the slim strip can be judged */
  .doors-toggle { text-align: right; margin-bottom: 6px; }
  .doors-toggle button { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--faint); text-transform: uppercase; }
  .doors-toggle button:hover { color: var(--bone); }

  .doors { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); }
  .door { display: block; padding: 20px 18px 22px; text-decoration: none; color: inherit; }
  .door + .door { border-left: 1px solid var(--hair-soft); }
  .door__kicker { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--faint); }
  .door__kicker .on { color: var(--gold); }
  .door__title { font-family: var(--display); font-weight: 600; font-size: 21px; color: var(--gold); margin-top: 8px; line-height: 1.15; }
  .door--off .door__title { color: var(--dim); }
  .door__desc { font-style: italic; font-size: 12.5px; color: var(--faint); margin-top: 6px; }
  @media (max-width: 640px) {
    .doors:not(.doors--slim) { grid-template-columns: 1fr; }
    .doors:not(.doors--slim) .door + .door { border-left: 0; border-top: 1px solid var(--hair-soft); }
  }
  /* slim variant: always 2-up, one-line titles, chrome not content */
  .doors--slim .door { padding: 12px 14px 13px; }
  .doors--slim .door__title { font-size: 15.5px; margin-top: 4px; }
  .doors--slim .door__desc { display: none; }

  /* ── Concept B: the cogitator console ─────────────────────────────────── */
  .console {
    margin-top: 64px;
    border: 1px solid var(--hair);
    background: var(--plate2);
  }
  .console__row { padding: 14px 16px 15px; }
  .console__row + .console__row { border-top: 1px solid var(--hair-soft); }
  .console__head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 11px; }
  .console__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--faint); }
  .console__label .req { color: var(--gold); }

  .stepper { display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
  .stepper button { padding: 1px 9px; font-size: 16px; line-height: 1; color: var(--dim); transition: color 0.25s; }
  .stepper button:hover { color: var(--gold); }
  .stepper__ix { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.2em; color: var(--faint); font-variant-numeric: tabular-nums; }

  /* the rail: one horizontal snap-scroll line — no wrap, edge fades */
  .scrollrail {
    display: flex; align-items: baseline; gap: 22px;
    overflow-x: auto; scroll-snap-type: x proximity;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(to right, transparent, #000 28px, #000 calc(100% - 28px), transparent);
    mask-image: linear-gradient(to right, transparent, #000 28px, #000 calc(100% - 28px), transparent);
    padding: 2px 28px 6px;
  }
  .scrollrail::-webkit-scrollbar { display: none; }
  .scrollrail button {
    position: relative; flex: none; scroll-snap-align: center;
    font-family: var(--body); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim); white-space: nowrap; padding: 3px 0;
    transition: color 0.3s, font-size 0.3s var(--ease);
  }
  .scrollrail button:hover { color: var(--bone); }
  .scrollrail button.on { color: var(--gold); font-size: 14.5px; padding-left: 12px; }
  .scrollrail button.on::before {
    content: ""; position: absolute; left: 0; top: 50%;
    width: 4px; height: 4px; margin-top: -2px; border-radius: 50%;
    background: var(--gold); animation: dotBreathe 5.4s ease-in-out infinite;
  }
  @keyframes dotBreathe { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }

  /* ── the plumb line: cause above, effect below ─────────────────────────── */
  .plumb {
    width: 1px; height: 44px; margin: 0 auto;
    background: linear-gradient(to bottom, var(--hair), var(--gold-dim));
    transform-origin: top;
  }
  .plumb.drop { animation: plumbDrop 0.7s var(--ease) both; }
  @keyframes plumbDrop { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  .answers { text-align: center; padding-top: 18px; }
  .answers__rubric { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold); }
  .verdict { max-width: 500px; margin: 22px auto 0; }
  .verdict__title { font-family: var(--display); font-weight: 600; font-size: clamp(30px, 5.6vw, 42px); line-height: 1.08; }
  .verdict__meta { font-style: italic; font-size: 14.5px; color: var(--dim); margin-top: 9px; }
  .verdict__meta .badge::before { content: "· "; color: var(--faint); }
  .verdict__note { font-size: 14.5px; color: var(--dim); margin-top: 12px; }
  .verdict__cta {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 20px; padding: 12px 22px;
    border: 1px solid var(--gold-dim);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--gold); text-decoration: none; transition: border-color 0.3s, color 0.3s;
  }
  .verdict__cta::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
  .verdict__cta:hover { border-color: var(--gold); color: var(--bone); }
  .fade-slot { animation: vFade 0.5s var(--ease) both; }
  @keyframes vFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* the answer zone's appendix — bracketed register */
  .register { max-width: 440px; margin: 30px auto 0; border-top: 1px solid var(--hair-soft); border-bottom: 1px solid var(--hair-soft); padding: 12px 4px 8px; }
  .register__label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--faint); text-align: left; }
  .register__row {
    display: flex; align-items: baseline; gap: 12px; width: 100%;
    padding: 10px 2px; text-align: left;
    transition: background 0.25s;
  }
  .register__row + .register__row { border-top: 1px solid var(--hair-soft); }
  .register__row:hover { background: rgba(228, 221, 203, 0.03); }
  .register__swap { font-family: var(--mono); font-size: 12px; color: var(--faint); flex: none; }
  .register__title { font-family: var(--body); font-size: 15px; color: var(--dim); flex: 1; }
  .register__row:hover .register__title { color: var(--bone); }

  @media (min-width: 720px) {
    /* desktop: the console breathes a little, rail may still scroll */
    .console__row { padding: 16px 20px 17px; }
  }
</style>
</head>
<body>
  <div class="lab-bar">
    <span>LAB · OFOB HIERARCHY — <b>B · COGITATOR CONSOLE</b></span>
    <nav><a href="./a-spine.html">A</a><a href="./c-muster.html">C</a><a href="./index.html">INDEX</a></nav>
  </div>

  <main class="wrap">
    <header class="mast">
      <p class="mast__kicker">Consult the Archive</p>
      <h1 class="mast__title">Find Your Next Book</h1>
    </header>

    <div class="doors-toggle"><button type="button" id="doorsBtn">doors: full ⇄ slim</button></div>
    <nav class="doors" id="doors" aria-label="Tools">
      <a class="door door--off" href="#">
        <p class="door__kicker">Tool I</p>
        <p class="door__title">Ask the Archive</p>
        <p class="door__desc">Five questions, ranked verdicts</p>
      </a>
      <a class="door" href="#" aria-current="page">
        <p class="door__kicker"><span class="on">● </span>Tool II</p>
        <p class="door__title">One Faction, One Book</p>
        <p class="door__desc">Pick a banner, receive an entry point</p>
      </a>
    </nav>

    <!-- the machine: every control lives inside this one frame -->
    <section class="console" aria-label="Selector console">
      <div class="console__row">
        <div class="console__head">
          <p class="console__label"><span class="req">●</span> Faction</p>
          <span class="stepper">
            <button type="button" id="prev" aria-label="Previous faction">‹</button>
            <span class="stepper__ix" id="ix">01/18</span>
            <button type="button" id="next" aria-label="Next faction">›</button>
          </span>
        </div>
        <div class="scrollrail" id="rail"></div>
      </div>
      <div class="console__row" id="chapterRow" hidden>
        <div class="console__head">
          <p class="console__label">Chapter · optional</p>
        </div>
        <div class="scrollrail" id="chapters"></div>
      </div>
    </section>

    <!-- the output: free of any frame, joined by the plumb -->
    <div class="plumb" id="plumb"></div>
    <section class="answers">
      <p class="answers__rubric">The Archive Answers</p>
      <div id="pickSlot"></div>
    </section>
  </main>

<script>
/* Full 18-faction roster — real starter picks from faction-starters.json. */
const FACTIONS = [
  { label: "Adepta Sororitas", picks: [
    { t: "Our Martyred Lady", a: "Danie Ware", k: "Audio Drama", note: "Sister Augusta's war of faith — the Order of Our Martyred Lady in fire and censer-smoke." },
    { t: "Rose at War", a: "Danie Ware", k: "Novel" },
    { t: "Rose in Darkness", a: "Danie Ware", k: "Novel" },
    { t: "Morvenn Vahl — Spear of Faith", a: "Jude Reid", k: "Novel" } ]},
  { label: "Adeptus Custodes", picks: [ { t: "Watchers of the Throne", a: "Chris Wraight", k: "Series", note: "The Emperor's own guard leave the Palace for the first time in millennia." } ]},
  { label: "Adeptus Mechanicus", picks: [ { t: "Priests of Mars", a: "Graham McNeill", k: "Trilogy" }, { t: "Belisarius Cawl: The Great Work", a: "Guy Haley", k: "Novel" } ]},
  { label: "Astra Militarum", picks: [ { t: "Fifteen Hours", a: "Mitchel Scanlon", k: "Audiobook", note: "One Guardsman, one dying world — the life expectancy on Broucheroc is fifteen hours." } ],
    chapters: [
      { label: "Overall", picks: null },
      { label: "Aeronautica Imperialis", picks: [ { t: "Double Eagle", a: "Dan Abnett", k: "Novel" } ] },
      { label: "Death Korps of Krieg", picks: [ { t: "Krieg", a: "Steve Lyons", k: "Novel" } ] },
      { label: "Catachan Jungle Fighters", picks: [ { t: "Deathworlder", a: "Victoria Hayward", k: "Novel" } ] },
      { label: "Cadian", picks: [ { t: "Cadia Stands", a: "Justin D. Hill", k: "Novel" }, { t: "Minka Lesk — The Last Whiteshield", a: "Justin D. Hill", k: "Novel" }, { t: "Catachan Devil", a: "Justin D. Hill", k: "Novel" } ] } ]},
  { label: "Grey Knights", picks: [ { t: "The Emperor's Gift", a: "Aaron Dembski-Bowden", k: "Novel" }, { t: "Grey Knights Omnibus", a: "Ben Counter", k: "Omnibus" } ]},
  { label: "Imperial Agents", picks: [ { t: "Assassinorum: Kingmaker", a: "Robert Rath", k: "Novel" }, { t: "Rites of Passage", a: "Mike Brooks", k: "Novel" }, { t: "Ciaphas Cain", a: "Sandy Mitchell", k: "Series" } ]},
  { label: "Imperial Knights", picks: [ { t: "Kingsblade", a: "Andy Clark", k: "Series" }, { t: "Assassinorum: Kingmaker", a: "Robert Rath", k: "Novel" } ]},
  { label: "Space Marines", picks: null, chapters: [
      { label: "Ultramarines", picks: [ { t: "Dark Imperium", a: "Guy Haley", k: "Novel", note: "Guilliman returns to a ruined Imperium — the Era Indomitus begins here." }, { t: "Uriel Ventris Chronicles", a: "Graham McNeill", k: "Series" } ] },
      { label: "Blood Angels", picks: [ { t: "Dante", a: "Guy Haley", k: "Novel" } ] },
      { label: "Dark Angels", picks: [ { t: "The Lion: Son of the Forest", a: "Mike Brooks", k: "Novel" } ] },
      { label: "Black Templars", picks: [ { t: "Helsreach", a: "Aaron Dembski-Bowden", k: "Novel" } ] },
      { label: "Deathwatch", picks: [ { t: "Deathwatch: The Omnibus", a: "Steve Parker", k: "Omnibus" } ] },
      { label: "Imperial Fists", picks: [ { t: "Fist of the Imperium", a: "Andy Clark", k: "Novel" } ] },
      { label: "Iron Hands", picks: [ { t: "Wrath of Iron", a: "Chris Wraight", k: "Novel" } ] },
      { label: "Raven Guard", picks: [ { t: "Apocalypse", a: "Josh Reynolds", k: "Novel" } ] },
      { label: "Salamanders", picks: [ { t: "Salamanders Omnibus", a: "Nick Kyme", k: "Omnibus" } ] },
      { label: "Space Wolves", picks: [ { t: "Space Wolf Omnibus", a: "William King", k: "Omnibus" } ] },
      { label: "White Scars", picks: [ { t: "Masters of the Hunt", a: "Chris Wraight", k: "Omnibus" } ] } ]},
  { label: "Chaos Space Marines", picks: null, chapters: [
      { label: "Black Legion", picks: [ { t: "The Talon of Horus", a: "Aaron Dembski-Bowden", k: "Novel", note: "Abaddon gathers the broken Legions — the birth of the Black Legion, told from within." } ] },
      { label: "Night Lords", picks: [ { t: "Night Lords Omnibus", a: "Aaron Dembski-Bowden", k: "Omnibus" }, { t: "Lord of the Night", a: "Simon Spurrier", k: "Novel" } ] },
      { label: "Death Guard", picks: [ { t: "Lords of Silence", a: "Chris Wraight", k: "Novel" } ] },
      { label: "Thousand Sons", picks: [ { t: "Ahriman", a: "John French", k: "Series" } ] },
      { label: "World Eaters", picks: [ { t: "Angron: The Red Angel", a: "David Guymer", k: "Novel" }, { t: "Khârn: Eater of Worlds", a: "Anthony Reynolds", k: "Novel" } ] },
      { label: "Iron Warriors", picks: [ { t: "Storm of Iron", a: "Graham McNeill", k: "Novel" } ] },
      { label: "Word Bearers", picks: [ { t: "The Word Bearers Omnibus", a: "Anthony Reynolds", k: "Omnibus" } ] },
      { label: "Fabius Bile", picks: [ { t: "Fabius Bile: The Omnibus", a: "Josh Reynolds", k: "Omnibus" } ] },
      { label: "Alpha Legion", picks: [ { t: "Renegades: Harrowmaster", a: "Mike Brooks", k: "Novel" } ] },
      { label: "Emperor's Children", picks: [ { t: "Lucius: The Faultless Blade", a: "Ian St. Martin", k: "Novel" } ] },
      { label: "Red Corsairs", picks: [ { t: "Huron Blackheart: Master of the Maelstrom", a: "Mike Brooks", k: "Novel" } ] } ]},
  { label: "Aeldari", picks: [ { t: "Valedor", a: "Guy Haley", k: "Novel" }, { t: "Path of the Eldar", a: "Gav Thorpe", k: "Omnibus" } ]},
  { label: "Drukhari", picks: [ { t: "Lelith Hesperax", a: "Rachel Harrison", k: "Novel" }, { t: "Path of the Dark Eldar", a: "Andy Chambers", k: "Omnibus" } ]},
  { label: "Genestealer Cults", picks: [ { t: "Day of Ascension", a: "Adrian Tchaikovsky", k: "Novel", note: "The Cult from the inside — hope, hunger, and the four-armed Emperor." } ]},
  { label: "Necrons", picks: [ { t: "The Infinite and the Divine", a: "Robert Rath", k: "Novel", note: "Trazyn and Orikan feud across sixty million years — the archive's most beloved duel of immortals." }, { t: "The Twice-Dead King: Ruin", a: "Nate Crowley", k: "Novel" } ]},
  { label: "Leagues of Votann", picks: [ { t: "The High Kâhl's Oath", a: "Alec Worley", k: "Novella" } ]},
  { label: "Orks", picks: [ { t: "Brutal Kunnin", a: "Mike Brooks", k: "Novel" }, { t: "Ghazghkull Thraka: Prophet of the Waaagh!", a: "Nate Crowley", k: "Novel" } ]},
  { label: "T'au Empire", picks: [ { t: "Elemental Council", a: "Noah Van Nguyen", k: "Novel" }, { t: "Farsight: Crisis of Faith", a: "Phil Kelly", k: "Novel" } ]},
  { label: "Tyranids", picks: [ { t: "The Great Devourer", a: "Various", k: "Omnibus" }, { t: "The Long and Hungry Road", a: "Marc Collins", k: "Novel" } ]},
  { label: "Inquisition", picks: [ { t: "Eisenhorn", a: "Dan Abnett", k: "Omnibus", note: "Where half the archive began — the inquisitor whose fall is measured in three books." }, { t: "Ravenor", a: "Dan Abnett", k: "Series" }, { t: "The Inquisition War", a: "Ian Watson", k: "Omnibus" } ]},
];

const rail = document.getElementById("rail");
const ix = document.getElementById("ix");
const chapterRow = document.getElementById("chapterRow");
const chaptersEl = document.getElementById("chapters");
const pickSlot = document.getElementById("pickSlot");
const plumb = document.getElementById("plumb");

let fi = 0, ci = 0, pi = 0;
const pad = (n) => String(n).padStart(2, "0");

function currentPicks() {
  const f = FACTIONS[fi];
  if (f.chapters) {
    const ch = f.chapters[ci];
    return ch.picks || f.picks || f.chapters.find((c) => c.picks)?.picks || [];
  }
  return f.picks || [];
}

function renderRail() {
  rail.innerHTML = FACTIONS.map((f, i) =>
    `<button type="button" class="${i === fi ? "on" : ""}" data-f="${i}">${f.label}</button>`
  ).join("");
  ix.textContent = pad(fi + 1) + "/" + pad(FACTIONS.length);
  const on = rail.querySelector(".on");
  if (on) on.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
}

function renderChapters() {
  const f = FACTIONS[fi];
  if (!f.chapters) { chapterRow.hidden = true; return; }
  chapterRow.hidden = false;
  chaptersEl.innerHTML = f.chapters.map((c, i) =>
    `<button type="button" class="${i === ci ? "on" : ""}" data-c="${i}">${c.label}</button>`
  ).join("");
  const on = chaptersEl.querySelector(".on");
  if (on) on.scrollIntoView({ inline: "center", block: "nearest" });
}

function renderPick() {
  const picks = currentPicks();
  const p = picks[Math.min(pi, picks.length - 1)];
  if (!p) { pickSlot.innerHTML = `<p class="verdict__note" style="font-style:italic">— No records in the archive yet —</p>`; return; }
  const others = picks.filter((x) => x !== p);
  pickSlot.innerHTML = `
    <div class="fade-slot">
      <div class="verdict">
        <h2 class="verdict__title">${p.t}</h2>
        <p class="verdict__meta">by ${p.a}<span class="badge">${p.k}</span></p>
        ${p.note ? `<p class="verdict__note">${p.note}</p>` : ""}
        <a class="verdict__cta" href="#">Open the book →</a>
      </div>
      ${others.length ? `
        <div class="register">
          <p class="register__label">Also on file</p>
          ${others.map((alt) => `
            <button type="button" class="register__row" data-p="${picks.indexOf(alt)}">
              <span class="register__swap">⇄</span>
              <span class="register__title">${alt.t} — <i>${alt.a}</i></span>
            </button>`).join("")}
        </div>` : ""}
    </div>`;
}

function dropPlumb() {
  plumb.classList.remove("drop");
  void plumb.offsetWidth; /* restart the animation */
  plumb.classList.add("drop");
}

function setFaction(i) {
  fi = (i + FACTIONS.length) % FACTIONS.length;
  ci = 0; pi = 0;
  renderRail(); renderChapters(); renderPick(); dropPlumb();
}

document.getElementById("prev").addEventListener("click", () => setFaction(fi - 1));
document.getElementById("next").addEventListener("click", () => setFaction(fi + 1));
rail.addEventListener("click", (e) => { const b = e.target.closest("[data-f]"); if (b) setFaction(+b.dataset.f); });
chaptersEl.addEventListener("click", (e) => { const b = e.target.closest("[data-c]"); if (b) { ci = +b.dataset.c; pi = 0; renderChapters(); renderPick(); dropPlumb(); } });
pickSlot.addEventListener("click", (e) => { const b = e.target.closest("[data-p]"); if (b) { pi = +b.dataset.p; renderPick(); } });
document.getElementById("doorsBtn").addEventListener("click", () => document.getElementById("doors").classList.toggle("doors--slim"));

setFaction(0);
</script>
</body>
</html>
